<!DOCTYPE html>
<html>
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    canvas { display: block; max-width: 100%; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <script>
    let img;
let dots = [];
let SPACING;
let DOT_SIZE = 2.5;
let RADIUS = 120;
let FORCE = 40;
let smoothX, smoothY;
let EASE = 0.2;

function preload() {
  img = loadImage('https://freight.cargo.site/t/original/i/b6383eac6670a941114f8284bd13b7da0103fead8746c2ca50537f930ea82bb6/kimi_logo_3.png');
}

function setup() {
  let canvasSize = min(windowWidth, img.width);
  let scale = canvasSize / img.width;
  createCanvas(img.width * scale, img.height * scale);
  noStroke();
  smoothX = (img.width * scale) / 2;
  smoothY = (img.height * scale) / 2;
  buildDots();
}

function windowResized() {
  let canvasSize = min(windowWidth, img.width);
  let scale = canvasSize / img.width;
  resizeCanvas(img.width * scale, img.height * scale);
  smoothX = width / 2;
  smoothY = height / 2;
  buildDots();
}     

function buildDots() {
  dots = [];
  SPACING = DOT_SIZE * 1 + 1.5;
  img.loadPixels();
  let cols = floor(width / SPACING);
  let rows = floor(height / SPACING);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let ox = c * SPACING + SPACING / 2;
      let oy = r * SPACING + SPACING / 2;
      let px = floor(ox / width * img.width);
      let py = floor(oy / height * img.height);
      let idx = (py * img.width + px) * 4;
      let r_ = img.pixels[idx];
      let g  = img.pixels[idx + 1];
      let b  = img.pixels[idx + 2];
      let a  = img.pixels[idx + 3];
      if (a === 0) continue;
      let col = color(r_, g, b, a);
      dots.push({ ox, oy, x: ox, y: oy, col, vx: 0, vy: 0 });
    }
  }
}

function mousePressed() {
  for (let d of dots) {
    let dx = d.ox - mouseX;
    let dy = d.oy - mouseY;
    let dist = sqrt(dx * dx + dy * dy);
    let angle = atan2(dy, dx);
    let strength = map(dist, 0, width, 200, 20);
    d.vx = cos(angle) * strength;
    d.vy = sin(angle) * strength;
  }
}


function draw() {
  clear();

  // smooth mouse position
  smoothX = lerp(smoothX, mouseX, EASE);
  smoothY = lerp(smoothY, mouseY, EASE);
  
    let t = frameCount * 0.008; // slow time value driving the idle

  for (let d of dots) {
    let dx = d.ox - smoothX;
    let dy = d.oy - smoothY;
    let dist = sqrt(dx * dx + dy * dy);

    let currentSize = DOT_SIZE;
    
    // idle drift — unique per dot using origin as seed
    let idleX = sin(t + d.ox * 0.02) * 2.0;
    let idleY = cos(t + d.oy * 0.02) * 2.0;

    if (dist < RADIUS && dist > 0) {
      let t = 1 - dist / RADIUS;
      let smooth = t * t * (3 - 2 * t);
      let push = smooth * FORCE;
      d.x = d.ox + (dx / dist) * push;
      d.y = d.oy + (dy / dist) * push;
      // grow dots to fill gaps caused by spreading
      let spread = push / FORCE;
      currentSize = DOT_SIZE + spread * (SPACING * 0.0);
    } else {
      // apply velocity then decay it
      d.x += d.vx;
      d.y += d.vy;
      d.vx *= 0.3; // friction — lower = stops faster
      d.vy *= 0.3;

      // spring back to idle position
      d.x += (d.ox + idleX - d.x) * 0.06;
      d.y += (d.oy + idleY - d.y) * 0.06;
    }

    fill(d.col);
    circle(d.x, d.y, currentSize);
  }
}
  </script>
</body>
</html>
